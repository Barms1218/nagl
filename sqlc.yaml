version: "2"
sql:
  - schema: "internal/sql/schema"
    queries: "internal/sql/queries"
    engine: "postgresql"
    gen:
      go:
        package: "database"             
        out: "internal/database"        
        sql_package: "pgx/v5"
        emit_json_tags: true            
        emit_prepared_queries: false    
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
